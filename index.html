<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테니스 매칭 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f9; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .back-btn { background: #6c757d; }
        #resultArea { margin-top: 15px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card" id="step1">
        <h3>1단계: 기본 설정</h3>
        참가 인원: <input type="number" id="numPeople" value="12" style="width:50px;">명<br>
        운용 세트 수: <input type="number" id="totalSets" value="5" oninput="updateTotalGames()" style="width:50px;">세트
        <p>→ 총 <span id="totalGamesDisp" style="color:blue; font-weight:bold;">10</span>경기 진행</p>
        <button onclick="goToStep2()">멤버 상세 입력</button>
    </div>

    <div class="card" id="step2" style="display:none;">
        <h3>2단계: 멤버 정보</h3>
        <div id="memberInputs"></div>
        <button onclick="goToStep3()">게임 타입 선택</button>
        <button class="back-btn" onclick="backTo(1)">뒤로가기</button>
    </div>

    <div class="card" id="step3" style="display:none;">
        <h3>3단계: 타입별 경기 배분</h3>
        <p id="stats"></p>
        <div class="row">남복 경기: <input type="number" id="gameM" value="4" oninput="checkTotal()"></div>
        <div class="row">혼복 경기: <input type="number" id="gameMix" value="4" oninput="checkTotal()"></div>
        <div class="row">여복 경기: <input type="number" id="gameF" value="2" oninput="checkTotal()"></div>
        <p>남은 경기: <span id="remainingGames" style="font-weight:bold; color:red;">0</span></p>
        <button id="matchBtn" onclick="runMatching()">최종 팀 매칭 실행</button>
        <button class="back-btn" onclick="backTo(2)">뒤로가기</button>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <h3>최종 대진표</h3>
        <div id="resultArea"></div>
        <button onclick="location.reload()">처음으로</button>
    </div>

    <script>
        function updateTotalGames() {
            const sets = parseInt(document.getElementById('totalSets').value) || 0;
            document.getElementById('totalGamesDisp').innerText = sets * 2;
        }

        function backTo(step) {
            document.getElementById('step1').style.display = (step === 1) ? 'block' : 'none';
            document.getElementById('step2').style.display = (step === 2) ? 'block' : 'none';
            document.getElementById('step3').style.display = (step === 3) ? 'block' : 'none';
            document.getElementById('resultCard').style.display = 'none';
        }

        function goToStep2() {
            const num = parseInt(document.getElementById('numPeople').value);
            let html = "";
            for(let i=1; i<=num; i++) {
                html += `<div class="row">
                    <input type="text" id="name${i}" value="선수${i}" maxlength="5" style="width:50px;">
                    <label><input type="radio" name="sex${i}" value="M" ${i%3!=0?'checked':''}>남</label>
                    <label><input type="radio" name="sex${i}" value="F" ${i%3==0?'checked':''}>여</label>
                    <input type="number" id="skill${i}" value="${Math.floor(Math.random()*10)+1}" style="width:35px;">
                </div>`;
            }
            document.getElementById('memberInputs').innerHTML = html;
            backTo(2);
        }

        function goToStep3() {
            let mCount = 0, fCount = 0;
            const num = parseInt(document.getElementById('numPeople').value);
            for(let i=1; i<=num; i++) {
                if(document.querySelector(`input[name="sex${i}"]:checked`).value === 'M') mCount++;
                else fCount++;
            }
            document.getElementById('stats').innerText = `남성: ${mCount}명 / 여성: ${fCount}명`;
            checkTotal();
            backTo(3);
        }

        function checkTotal() {
            const total = parseInt(document.getElementById('totalSets').value) * 2;
            const m = parseInt(document.getElementById('gameM').value) || 0;
            const mix = parseInt(document.getElementById('gameMix').value) || 0;
            const f = parseInt(document.getElementById('gameF').value) || 0;
            const remaining = total - (m + mix + f);
            document.getElementById('remainingGames').innerText = remaining;
            document.getElementById('matchBtn').disabled = (remaining !== 0);
        }

        function runMatching() {
            let members = [];
            const num = parseInt(document.getElementById('numPeople').value);
            for(let i=1; i<=num; i++) {
                members.push({
                    name: document.getElementById(`name${i}`).value,
                    sex: document.querySelector(`input[name="sex${i}"]:checked`).value,
                    skill: parseInt(document.getElementById(`skill${i}`).value)
                });
            }

            // [알고리즘] 1. 상위 6명 여성 보정
            let sorted = [...members].sort((a,b) => b.skill - a.skill);
            members.forEach(m => {
                let rank = sorted.indexOf(m);
                if(rank < 6 && m.sex === 'F') m.skill += 2;
            });

            // [알고리즘] 2. 매칭 시뮬레이션
            let result = "";
            const mGames = parseInt(document.getElementById('gameM').value);
            const mixGames = parseInt(document.getElementById('gameMix').value);
            const fGames = parseInt(document.getElementById('gameF').value);
            
            const schedule = Array(mGames).fill('남복').concat(Array(mixGames).fill('혼복')).concat(Array(fGames).fill('여복'));
            
            schedule.forEach((type, idx) => {
                result += `[${idx+1}경기 - ${type}]\n`;
                // 간단한 밸런스 매칭 (상위/하위 섞기)
                let temp = [...members].sort((a,b) => b.skill - a.skill);
                result += `  코트1: ${temp[0].name}, ${temp[7].name} vs ${temp[1].name}, ${temp[6].name}\n`;
                result += `  코트2: ${temp[2].name}, ${temp[5].name} vs ${temp[3].name}, ${temp[4].name}\n\n`;
            });

            document.getElementById('step3').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resultArea').innerText = result;
        }
    </script>
</body>
</html>
