<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테니스 매칭 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f9; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; min-height: 350px; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .back-btn { background: #6c757d; }
        #resultArea { margin-top: 15px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; white-space: pre-wrap; font-size: 13px; line-height: 1.5; }
        .version { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div class="card" id="step1">
        <h3>1단계: 기본 설정</h3>
        참가 인원: <input type="number" id="numPeople" value="12" style="width:50px;">명<br>
        운용 세트 수: <input type="number" id="totalSets" value="5" style="width:50px;">세트<br>
        모드 선택: 
        <select id="mode" style="padding:5px;">
            <option value="level">레벨 방식 (1-10 입력)</option>
            <option value="rank">순위 방식 (등수 입력)</option>
        </select>
        <button onclick="goToStep2()">멤버 상세 입력</button>
        <div class="version">v1.0.2</div>
    </div>

    <div class="card" id="step2" style="display:none;">
        <h3>2단계: 멤버 정보</h3>
        <div id="memberInputs"></div>
        <button onclick="runMatching()">최종 매칭 실행</button>
        <button class="back-btn" onclick="backTo(1)">뒤로가기</button>
        <div class="version">v1.0.2</div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <h3>최종 대진표</h3>
        <div id="resultArea"></div>
        <button onclick="location.reload()">처음으로</button>
        <div class="version">v1.0.2</div>
    </div>

    <script>
        function backTo(step) {
            document.getElementById('step1').style.display = (step === 1) ? 'block' : 'none';
            document.getElementById('step2').style.display = (step === 2) ? 'block' : 'none';
            document.getElementById('resultCard').style.display = 'none';
        }

        function goToStep2() {
            const num = parseInt(document.getElementById('numPeople').value);
            let html = "";
            for(let i=1; i<=num; i++) {
                html += `<div class="row">
                    <input type="text" id="name${i}" placeholder="이름${i}" style="width:50px;">
                    <select id="sex${i}"><option value="M">남</option><option value="F">여</option></select>
                    <input type="number" id="val${i}" placeholder="수치" style="width:40px;">
                </div>`;
            }
            document.getElementById('memberInputs').innerHTML = html;
            backTo(2);
        }

        function runMatching() {
            let members = [];
            const num = parseInt(document.getElementById('numPeople').value);
            const mode = document.getElementById('mode').value;

            for(let i=1; i<=num; i++) {
                members.push({
                    name: document.getElementById(`name${i}`).value || `선수${i}`,
                    sex: document.getElementById(`sex${i}`).value,
                    val: parseInt(document.getElementById(`val${i}`).value) || 1
                });
            }

            // [알고리즘]
            if(mode === 'level') {
                // 레벨: 여성 6이상 남성 보정 후 정렬
                members.forEach(m => { if(m.sex === 'F' && m.val >= 6) m.val += 2; });
                members.sort((a,b) => b.val - a.val);
            } else {
                // 순위: 랜덤성 포함 정렬
                members.sort(() => Math.random() - 0.5);
            }

            let result = `--- 최종 대진표 (${mode === 'level' ? '레벨' : '순위'} 모드) ---\n\n`;
            const sets = parseInt(document.getElementById('totalSets').value);
            
            for(let i = 1; i <= sets; i++) {
                // 매 세트마다 약간의 랜덤성(밸런스 파괴) 부여
                let currentMembers = [...members].sort(() => (Math.random() > 0.8 ? 0.5 : -0.5));
                
                result += `[${i}세트]\n`;
                result += `A코트: [${currentMembers[0].name}, ${currentMembers[7].name}] vs [${currentMembers[1].name}, ${currentMembers[6].name}]\n`;
                result += `B코트: [${currentMembers[2].name}, ${currentMembers[5].name}] vs [${currentMembers[3].name}, ${currentMembers[4].name}]\n\n`;
            }

            document.getElementById('step2').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resultArea').innerText = result;
        }
    </script>
</body>
</html>
