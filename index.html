<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테니스 매칭 관리자</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; border: none; font-weight: bold; }
        .game-block { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎾 테니스 전체 스케줄링</h2>
        <input type="number" id="numPeople" placeholder="참가 인원수 (예: 12)">
        <input type="number" id="numGames" placeholder="오늘 총 경기 수 (예: 5)">
        <button onclick="generateSchedule()">전체 일정 생성</button>
        <div id="scheduleResult"></div>
    </div>

<script>
function generateSchedule() {
    const total = parseInt(document.getElementById('numPeople').value);
    const totalGames = parseInt(document.getElementById('numGames').value);
    
    // 멤버 초기화 (played: 0회)
    let members = Array.from({length: total}, (_, i) => ({
        id: i, name: `멤버${i+1}`, skill: Math.floor(Math.random() * 5) + 1, played: 0
    }));

    let html = "";
    
    // 경기 로테이션 생성
    for(let g = 1; g <= totalGames; g++) {
        // 1. 경기 횟수가 적은 사람 우선 정렬
        members.sort((a, b) => a.played - b.played || b.skill - a.skill);
        
        let pool = members.slice(0, 8); // 현재 경기 참여할 8명
        
        html += `<div class="game-block"><h4>제 ${g}경기</h4>`;
        
        // 2개 코트 배정
        for(let c = 0; c < 2; c++) {
            let courtPool = pool.slice(c*4, c*4+4);
            if(courtPool.length === 4) {
                // 지그재그 밸런싱 (1등+4등 vs 2등+3등)
                courtPool.sort((a, b) => a.skill - b.skill);
                let teamA = [courtPool[0], courtPool[3]];
                let teamB = [courtPool[1], courtPool[2]];
                
                html += `<strong>코트 ${c+1}:</strong> ${teamA.map(m=>m.name).join(',')} vs ${teamB.map(m=>m.name).join(',')}<br>`;
                
                // 경기 횟수 업데이트
                [...teamA, ...teamB].forEach(m => members.find(x => x.id === m.id).played++);
            }
        }
        html += `</div>`;
    }
    
    document.getElementById('scheduleResult').innerHTML = html;
}
</script>
</body>
</html>
